<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — TricolorGaming</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0A14'/%3E%3Cpath d='M10 14h4m4 0h4M15 11v6M11 11v6' stroke='%23FFD700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Crect x='4' y='10' width='24' height='12' rx='5' stroke='%23FFD700' stroke-width='2' fill='none'/%3E%3C/svg%3E">
</head>
<body>
  <div id="header"></div>
  <main id="main-content"></main>
  <div id="footer"></div>
  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/components.js"></script>
  <script>
    includeHeader()
    includeFooter()

    const slug = getParam('slug')
    const entry = BLOG.find(e => e.slug === slug)

    if (!entry) {
      document.getElementById('main-content').innerHTML = `
        <div class="breadcrumbs"><a href="index.html">Inicio</a> <span>/</span> <a href="blog.html">Blog</a> <span>/</span> <span>No encontrado</span></div>
        <section class="section">
          <div class="container">
            <div class="empty-state">
              <h2>Entrada no encontrada</h2>
              <p>El artículo que buscas no existe.</p>
              <a href="blog.html" class="btn btn-primary">Volver al blog</a>
            </div>
          </div>
        </section>
      `
    } else {
      document.getElementById('main-content').innerHTML = `
        <div class="breadcrumbs">
          <a href="index.html">Inicio</a> <span>/</span>
          <a href="blog.html">Blog</a> <span>/</span>
          <span>${entry.titulo}</span>
        </div>
        <article class="section">
          <div class="container blog-post-container">
            <div class="blog-post-header">
              <div class="blog-meta">
                <span class="blog-date">${formatearFecha(entry.fecha)}</span>
                <span class="blog-author">Por ${entry.autor}</span>
              </div>
              <h1>${entry.titulo}</h1>
              <div class="blog-tags">${entry.tags.map(t => renderTag(t)).join(' ')}</div>
            </div>
            <div class="blog-post-image">
              <img src="${entry.imagen}" alt="${entry.titulo}">
            </div>
            <div class="blog-post-content">${entry.contenido}</div>
            <div class="blog-post-nav">
              <a href="blog.html" class="btn btn-outline">← Volver al blog</a>
            </div>
          </div>
        </article>
      `
    }
  </script>
</body>
</html>
