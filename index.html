<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TricolorGaming — Tu tienda gaming en Colombia</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0A14'/%3E%3Cpath d='M10 14h4m4 0h4M15 11v6M11 11v6' stroke='%23FFD700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Crect x='4' y='10' width='24' height='12' rx='5' stroke='%23FFD700' stroke-width='2' fill='none'/%3E%3C/svg%3E">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Bienvenido a <span class="text-dorado">Tricolor</span><span class="text-azul">Gaming</span></h1>
        <p>Tu tienda de confianza para equipar tu setup gaming desde Santa Marta para toda Colombia.</p>
        <div class="hero-actions">
          <a href="tienda.html" class="btn btn-primary">Ver tienda</a>
          <a href="nosotros.html" class="btn btn-outline">Conócenos</a>
        </div>
      </div>
    </section>

    <section class="section" id="categorias-section">
      <div class="container">
        <h2 class="section-title">Categorías</h2>
        <div class="categorias-grid" id="categorias-grid"></div>
      </div>
    </section>

    <section class="section section-dark" id="destacados-section">
      <div class="container">
        <h2 class="section-title">Productos Destacados</h2>
        <div class="productos-grid" id="productos-destacados"></div>
        <div class="section-actions">
          <a href="tienda.html" class="btn btn-primary">Ver todos los productos</a>
        </div>
      </div>
    </section>

    <section class="section" id="marcas-section">
      <div class="container">
        <h2 class="section-title">Marcas</h2>
        <div class="marcas-grid" id="marcas-grid"></div>
      </div>
    </section>

    <section class="section section-dark" id="blog-section">
      <div class="container">
        <h2 class="section-title">Últimas del Blog</h2>
        <div class="blog-grid-home" id="blog-grid"></div>
        <div class="section-actions">
          <a href="blog.html" class="btn btn-outline">Ver blog completo</a>
        </div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/components.js"></script>
  <script>
    includeHeader()
    includeFooter()

    const catGrid = document.getElementById('categorias-grid')
    if (catGrid) {
      catGrid.innerHTML = CATEGORIAS.map(c => `
        <a href="tienda.html?cat=${c.id}" class="categoria-card">
          <span class="categoria-icon">${c.icono}</span>
          <h3>${c.nombre}</h3>
          <p>${c.subcategorias.length} subcategorías</p>
        </a>
      `).join('')
    }

    const destGrid = document.getElementById('productos-destacados')
    if (destGrid) {
      destGrid.innerHTML = PRODUCTOS.filter(p => p.destacado).slice(0, 8).map(renderProductCard).join('')
    }

    const marcasGrid = document.getElementById('marcas-grid')
    if (marcasGrid) {
      marcasGrid.innerHTML = MARCAS.map(m => `
        <a href="tienda.html?marca=${m.id}" class="marca-card">
          <span class="marca-nombre">${m.nombre}</span>
        </a>
      `).join('')
    }

    const blogGrid = document.getElementById('blog-grid')
    if (blogGrid) {
      blogGrid.innerHTML = BLOG.slice(0, 3).map(entry => `
        <a href="entrada.html?slug=${entry.slug}" class="blog-card-home">
          <div class="blog-card-img">
            <img src="${entry.imagen}" alt="${entry.titulo}" loading="lazy">
          </div>
          <div class="blog-card-body">
            <span class="blog-date">${formatearFecha(entry.fecha)}</span>
            <h3>${entry.titulo}</h3>
            <p>${entry.resumen}</p>
            <span class="blog-read-more">Leer más →</span>
          </div>
        </a>
      `).join('')
    }
  </script>
</body>
</html>
